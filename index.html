<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova - Assistant IA Avancé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --panel: #1e293b; }
        body { background-color: var(--bg); color: #f8fafc; overflow: hidden; }
        .chat-container { height: calc(100vh - 180px); }
        .message-user { background: #334155; border-radius: 18px 18px 2px 18px; }
        .message-ai { background: #1e293b; border-radius: 18px 18px 18px 2px; border: 1px solid #334155; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .loading-dots span { animation: blink 1.4s infinite both; font-size: 1.5rem; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        .sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); position: absolute; z-index: 50; height: 100%; } .sidebar.open { transform: translateX(0); } }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar / Options -->
    <aside id="sidebar" class="sidebar w-72 bg-[#020617] border-r border-slate-800 p-6 flex flex-col gap-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-robot text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Nova AI</h1>
        </div>

        <div class="space-y-6 flex-1 overflow-y-auto custom-scroll pr-2">
            <!-- Mode de réponse -->
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Mode de réponse</label>
                <select id="ai-tone" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-indigo-500">
                    <option value="Sois un assistant utile et amical.">Standard</option>
                    <option value="Sois très concis et direct.">Concis</option>
                    <option value="Sois créatif et poétique dans tes réponses.">Créatif</option>
                    <option value="Réponds de manière très technique et détaillée.">Expert</option>
                </select>
            </div>

            <!-- Outils -->
            <div class="space-y-3">
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Outils</label>
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-800">
                    <span class="text-sm"><i class="fas fa-search mr-2 text-blue-400"></i> Recherche Web</span>
                    <input type="checkbox" id="web-search" class="w-4 h-4 accent-indigo-500">
                </div>
                <div class="flex items-center justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-800">
                    <span class="text-sm"><i class="fas fa-image mr-2 text-purple-400"></i> Générer Image</span>
                    <input type="checkbox" id="mode-image" class="w-4 h-4 accent-indigo-500">
                </div>
            </div>

            <!-- Synthèse Vocale -->
            <div>
                <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Voix de l'IA</label>
                <select id="voice-name" class="w-full mt-2 bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm outline-none focus:border-indigo-500">
                    <option value="Kore">Kore (Douce)</option>
                    <option value="Zephyr">Zephyr (Sérieux)</option>
                    <option value="Charon">Charon (Profond)</option>
                    <option value="Aoede">Aoede (Mélodieux)</option>
                </select>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="auto-tts" class="accent-indigo-500">
                    <label for="auto-tts" class="text-xs text-slate-400">Lecture automatique</label>
                </div>
            </div>
        </div>

        <button onclick="clearChat()" class="text-sm text-slate-400 hover:text-white transition-colors flex items-center gap-2">
            <i class="fas fa-trash"></i> Effacer la conversation
        </button>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative bg-slate-950/50">
        <!-- Header Mobile -->
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-slate-900/20">
            <button onclick="toggleSidebar()" class="md:hidden text-xl"><i class="fas fa-bars"></i></button>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm font-medium text-slate-300">Système opérationnel</span>
            </div>
            <div class="flex gap-4">
                <i class="fas fa-shield-halved text-slate-500" title="Sécurisé"></i>
            </div>
        </header>

        <!-- Messages -->
        <div id="chat-messages" class="chat-container overflow-y-auto p-6 space-y-6 custom-scroll">
            <!-- Message de bienvenue -->
            <div class="flex gap-4 message-ai p-4 max-w-3xl">
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shrink-0">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="space-y-2">
                    <p class="text-sm leading-relaxed">Bonjour ! Je suis **Nova**, votre assistant personnel intelligent. Comment puis-je vous aider aujourd'hui ?</p>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="prefill('Génère une image d\'une ville futuriste')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full border border-slate-700 transition-colors">Générer une image</button>
                        <button onclick="prefill('Quelles sont les dernières nouvelles tech ?')" class="text-xs bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full border border-slate-700 transition-colors">Dernières news Tech</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <!-- Prévisualisation Image Upload -->
                <div id="image-preview-container" class="hidden mb-2 p-2 bg-slate-800 rounded-lg flex items-center gap-2 w-fit border border-indigo-500">
                    <img id="image-preview" src="" class="h-12 w-12 object-cover rounded">
                    <button onclick="removeImage()" class="text-xs text-red-400 hover:text-red-300"><i class="fas fa-times"></i></button>
                </div>

                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-2 flex items-end gap-2 shadow-2xl focus-within:border-indigo-500 transition-all">
                    <label class="p-3 text-slate-400 hover:text-indigo-400 cursor-pointer transition-colors">
                        <i class="fas fa-paperclip text-lg"></i>
                        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                    </label>
                    <textarea id="user-input" rows="1" placeholder="Posez-moi une question..." 
                        class="flex-1 bg-transparent border-none outline-none p-3 text-sm resize-none custom-scroll max-h-40"
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="send-btn" onclick="handleSend()" class="bg-indigo-600 hover:bg-indigo-500 w-11 h-11 rounded-xl flex items-center justify-center transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-slate-500 uppercase tracking-widest">Nova AI v2.5 • Gemini Intelligence</p>
            </div>
        </div>
    </main>

    <script type="module">
        const apiKey = ""; // Fourni par l'environnement
        let currentBase64Image = null;

        // Fonction pour envoyer le message
        window.handleSend = async () => {
            const input = document.getElementById('user-input');
            const chatMessages = document.getElementById('chat-messages');
            const text = input.value.trim();
            const isImageMode = document.getElementById('mode-image').checked;
            const useWebSearch = document.getElementById('web-search').checked;
            const aiTone = document.getElementById('ai-tone').value;

            if (!text && !currentBase64Image) return;

            // Ajouter message utilisateur
            appendMessage('user', text, currentBase64Image);
            input.value = '';
            input.style.height = 'auto';
            const tempImage = currentBase64Image;
            removeImage();

            // Ajouter indicateur de chargement
            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                if (isImageMode && text) {
                    // GENERATION D'IMAGE
                    await generateImage(text, loadingId);
                } else {
                    // GENERATION DE TEXTE / ANALYSE IMAGE
                    await generateText(text, tempImage, loadingId, useWebSearch, aiTone);
                }
            } catch (error) {
                replaceLoadingWithError(loadingId, "Une erreur est survenue lors de la communication avec l'IA.");
            }
        };

        // API : Génération de texte
        async function generateText(prompt, imageBase64, loadingId, useSearch, tone) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const contents = [{
                role: "user",
                parts: [{ text: prompt }]
            }];

            if (imageBase64) {
                contents[0].parts.push({
                    inlineData: { mimeType: "image/png", data: imageBase64 }
                });
            }

            const payload = {
                contents: contents,
                systemInstruction: { parts: [{ text: tone }] }
            };

            if (useSearch) {
                payload.tools = [{ google_search: {} }];
            }

            const response = await fetchWithRetry(url, payload);
            const result = await response.json();
            const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Je n'ai pas pu générer de réponse.";
            const sources = result.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({ uri: a.web?.uri, title: a.web?.title })) || [];

            replaceLoadingWithContent(loadingId, aiText, sources);
            
            if (document.getElementById('auto-tts').checked) {
                speakText(aiText);
            }
        }

        // API : Génération d'image
        async function generateImage(prompt, loadingId) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = { instances: { prompt: prompt }, parameters: { sampleCount: 1 } };
            
            const response = await fetchWithRetry(url, payload);
            const result = await response.json();
            const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            
            replaceLoadingWithImage(loadingId, imageUrl, prompt);
        }

        // API : Synthèse Vocale (TTS)
        window.speakText = async (text) => {
            const voice = document.getElementById('voice-name').value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                }
            };

            try {
                const response = await fetchWithRetry(url, payload);
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                playPCM(audioData);
            } catch (e) {
                console.error("TTS Error", e);
            }
        };

        // Helpers techniques
        async function fetchWithRetry(url, payload, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) return res;
                } catch (e) {}
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw new Error("Failed after retries");
        }

        function playPCM(base64) {
            const binary = atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
            
            // Conversion simplifiée PCM16 vers WAV pour le navigateur
            const wavHeader = createWavHeader(len, 24000); // Gemini TTS utilise souvent 24kHz
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            const audio = new Audio(URL.createObjectURL(blob));
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, dataLength, true);
            return buffer;
        }

        // Gestion UI
        function appendMessage(role, text, image = null) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex gap-4 ${role === 'user' ? 'message-user' : 'message-ai'} p-4 max-w-3xl ${role === 'user' ? 'ml-auto' : ''}`;
            
            let content = '';
            if (image) content += `<img src="data:image/png;base64,${image}" class="max-w-xs rounded-lg mb-2 border border-slate-600">`;
            if (text) content += `<div class="text-sm leading-relaxed">${marked.parse(text)}</div>`;
            
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${role === 'user' ? 'bg-slate-600' : 'bg-indigo-600'} flex items-center justify-center shrink-0 order-${role === 'user' ? '2' : '1'}">
                    <i class="fas fa-${role === 'user' ? 'user' : 'robot'} text-xs"></i>
                </div>
                <div class="flex-1 order-${role === 'user' ? '1' : '2'}">${content}</div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function appendLoading(id) {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-4 message-ai p-4 max-w-3xl";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shrink-0">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="loading-dots flex gap-1 items-center">
                    <span class="text-indigo-400">•</span><span class="text-indigo-400">•</span><span class="text-indigo-400">•</span>
                </div>
            `;
            chat.appendChild(div);
        }

        function replaceLoadingWithContent(id, text, sources) {
            const el = document.getElementById(id);
            if (!el) return;
            
            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = `<div class="mt-4 pt-2 border-t border-slate-800 text-xs text-slate-500">
                    <p class="mb-1 font-bold">Sources :</p>
                    <div class="flex flex-wrap gap-2">
                        ${sources.map(s => `<a href="${s.uri}" target="_blank" class="hover:text-indigo-400 underline">${s.title || 'Lien'}</a>`).join('')}
                    </div>
                </div>`;
            }

            el.querySelector('.loading-dots').remove();
            const contentDiv = document.createElement('div');
            contentDiv.className = "flex-1";
            contentDiv.innerHTML = `
                <div class="text-sm leading-relaxed">${marked.parse(text)}</div>
                ${sourcesHtml}
                <button onclick="speakText(\`${text.replace(/[`"']/g, '')}\`)" class="mt-3 text-[10px] text-slate-500 hover:text-indigo-400 uppercase tracking-widest flex items-center gap-1">
                    <i class="fas fa-volume-up"></i> Lire la réponse
                </button>
            `;
            el.appendChild(contentDiv);
        }

        function replaceLoadingWithImage(id, url, prompt) {
            const el = document.getElementById(id);
            el.querySelector('.loading-dots').remove();
            el.innerHTML += `
                <div class="space-y-3">
                    <p class="text-xs text-slate-400 italic">" ${prompt} "</p>
                    <img src="${url}" class="rounded-xl shadow-lg border border-slate-700 max-w-full">
                    <a href="${url}" download="nova-gen.png" class="inline-block text-xs text-indigo-400 hover:underline">Télécharger l'image</a>
                </div>
            `;
        }

        function replaceLoadingWithError(id, msg) {
            const el = document.getElementById(id);
            el.querySelector('.loading-dots').innerHTML = `<span class="text-red-400 text-sm">${msg}</span>`;
        }

        window.handleImage = (input) => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentBase64Image = e.target.result.split(',')[1];
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        };

        window.removeImage = () => {
            currentBase64Image = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = '';
        };

        window.prefill = (text) => {
            document.getElementById('user-input').value = text;
            document.getElementById('user-input').focus();
        };

        window.clearChat = () => {
            document.getElementById('chat-messages').innerHTML = '';
            appendMessage('ai', "Conversation réinitialisée. Comment puis-je vous aider ?");
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        // Gestion Entrée clavier
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

    </script>
</body>
</html>
